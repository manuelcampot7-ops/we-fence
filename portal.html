<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WeFence — Client Portal</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js" crossorigin="anonymous"></script>
<style>
  :root {
    --ink: #12160F;
    --ink-2: #1E241B;
    --cream: #F4EFE4;
    --cream-2: #EBE5D6;
    --paper: #FAF7EF;
    --forest: #2C3B26;
    --forest-deep: #1B2517;
    --moss: #4A6B3A;
    --amber: #D99A2B;
    --amber-soft: #E8B24A;
    --rust: #A64B2A;
    --line: rgba(18,22,15,0.12);
    --line-soft: rgba(18,22,15,0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01","cv11";
    min-height: 100vh;
  }
  .serif { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  a { color: inherit; }
  button { font-family: inherit; cursor: pointer; }
  .container { max-width: 1240px; margin: 0 auto; padding: 0 28px; }

  /* HEADER */
  .nav {
    background: var(--forest-deep); color: var(--cream);
    border-bottom: 1px solid rgba(244,239,228,0.08);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: -0.01em; font-size: 18px; }
  .logo-mark {
    width: 30px; height: 30px; border-radius: 6px;
    background: var(--cream);
    display: grid; place-items: center; color: var(--forest-deep);
    font-family: 'Instrument Serif', serif; font-size: 20px; font-style: italic;
    position: relative; overflow: hidden;
  }
  .logo-mark::after {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent 0 4px, rgba(28,40,22,0.18) 4px 5px);
  }
  .nav-meta { display: flex; align-items: center; gap: 14px; font-size: 13px; color: #cfc8b4; }
  .nav-meta .pill {
    padding: 5px 10px; border-radius: 999px; border: 1px solid rgba(244,239,228,0.18);
    font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    border: 1px solid rgba(244,239,228,0.25); background: transparent; color: var(--cream);
    text-decoration: none; transition: all .2s ease;
  }
  .btn:hover { background: rgba(244,239,228,0.08); border-color: var(--cream); }
  .btn.amber { background: var(--amber); border-color: var(--amber); color: #231a05; }
  .btn.amber:hover { background: var(--amber-soft); border-color: var(--amber-soft); }
  .btn.dark { background: var(--ink); border-color: var(--ink); color: var(--cream); }

  /* LOGIN */
  .login-wrap {
    min-height: 100vh; display: grid; place-items: center;
    background: var(--paper);
    background-image:
      radial-gradient(900px 500px at 20% -10%, rgba(217,154,43,0.12), transparent 60%),
      radial-gradient(900px 500px at 100% 110%, rgba(74,107,58,0.18), transparent 60%);
    padding: 32px 16px;
  }
  .login-card {
    width: 100%; max-width: 420px;
    background: #fff; border: 1px solid var(--line);
    border-radius: 22px; padding: 36px 32px;
    box-shadow: 0 40px 80px -30px rgba(0,0,0,0.18);
  }
  .login-card .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 18px; margin-bottom: 4px;
  }
  .login-card .brand .logo-mark {
    background: var(--forest); color: var(--cream);
  }
  .login-card h1 {
    font-family: 'Instrument Serif', serif; font-size: 38px;
    line-height: 1.05; letter-spacing: -0.02em;
    margin: 18px 0 8px; font-weight: 400;
  }
  .login-card h1 em { font-style: italic; color: var(--amber); }
  .login-card .lead { color: #4a4f41; font-size: 14px; margin-bottom: 22px; line-height: 1.5; }
  .field { display: grid; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 12px; color: #4a4f41; font-weight: 500; }
  .field input {
    width: 100%; border: 1px solid rgba(18,22,15,0.18); background: var(--paper);
    border-radius: 10px; padding: 12px 14px; font: inherit; color: inherit;
    outline: none; transition: border-color .15s ease;
  }
  .field input:focus { border-color: var(--ink); }
  .login-card .btn-submit {
    width: 100%; justify-content: center;
    background: var(--ink); color: var(--cream); border-color: var(--ink);
    padding: 13px 16px; font-size: 14px; margin-top: 6px;
  }
  .login-card .btn-submit:hover { background: var(--forest-deep); border-color: var(--forest-deep); }
  .login-card .btn-submit:disabled { opacity: 0.6; cursor: wait; }
  .err {
    margin-top: 14px; padding: 10px 12px; border-radius: 10px;
    background: rgba(166,75,42,0.1); border: 1px solid rgba(166,75,42,0.3);
    color: #8c3818; font-size: 13px;
  }
  .login-foot {
    margin-top: 20px; text-align: center; font-size: 11px; color: #8a8e7c;
    font-family: 'Geist Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* PANEL */
  .panel { padding: 36px 0; }
  .panel-head {
    display: flex; align-items: end; justify-content: space-between;
    gap: 24px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .panel-head .label {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #6b6f5e; margin-bottom: 6px;
  }
  .panel-head h2 {
    font-family: 'Instrument Serif', serif; font-size: clamp(34px, 4vw, 48px);
    line-height: 1.02; letter-spacing: -0.01em; margin: 0; font-weight: 400;
    display: flex; align-items: center; gap: 12px;
  }
  .panel-head h2 em { font-style: italic; color: var(--amber); }
  .count-pill {
    display: inline-flex; align-items: center; justify-content: center;
    height: 26px; min-width: 26px; padding: 0 9px;
    border-radius: 999px; background: rgba(217,154,43,0.14);
    border: 1px solid rgba(217,154,43,0.4);
    color: #8c5a13; font-size: 12px; font-weight: 600;
    font-family: 'Geist Mono', monospace;
  }
  .panel-head .sub { color: #6b6f5e; font-size: 14px; margin-top: 6px; }

  /* ACTION BAR (when something selected) */
  .action-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(90deg, rgba(217,154,43,0.16), rgba(232,178,74,0.08));
    border: 1px solid rgba(217,154,43,0.4); border-radius: 14px;
    padding: 11px 18px; margin-bottom: 12px;
    box-shadow: 0 6px 18px -10px rgba(217,154,43,0.4);
    animation: slideDown .25s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .action-bar .info {
    display: flex; align-items: center; gap: 9px;
    color: #8c5a13; font-size: 13px; font-weight: 600;
  }
  .action-bar .info .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--amber);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }
  .btn-download {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 10px;
    background: var(--ink); color: var(--cream); border: 0;
    font-size: 13px; font-weight: 600;
    transition: all .15s ease;
  }
  .btn-download:hover { background: var(--forest-deep); transform: translateY(-1px); }
  .btn-download:active { transform: translateY(0); }

  /* TABLE */
  .table-wrap {
    background: #fff; border: 1px solid var(--line); border-radius: 18px;
    overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.04);
  }
  table.leads { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.leads thead tr { background: var(--cream); border-bottom: 1px solid var(--line); }
  table.leads th {
    text-align: left; padding: 13px 18px;
    font-family: 'Geist Mono', monospace; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase; color: #6b6f5e;
    font-weight: 600;
  }
  table.leads th.checkbox-col { width: 44px; padding: 13px 0 13px 18px; }
  table.leads td { padding: 16px 18px; vertical-align: top; border-top: 1px solid var(--line-soft); }
  table.leads tbody tr { transition: background .15s ease; }
  table.leads tbody tr:hover { background: var(--paper); }
  table.leads tbody tr.selected { background: rgba(217,154,43,0.05); }
  table.leads tbody tr:first-child td { border-top: 0; }

  .checkbox {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1.5px solid rgba(18,22,15,0.25); cursor: pointer;
    appearance: none; -webkit-appearance: none;
    background: #fff;
    display: grid; place-items: center;
    transition: all .15s ease;
  }
  .checkbox:hover { border-color: var(--forest); }
  .checkbox:checked {
    background: var(--forest); border-color: var(--forest);
  }
  .checkbox:checked::after {
    content: ""; width: 9px; height: 5px;
    border-left: 2px solid var(--cream); border-bottom: 2px solid var(--cream);
    transform: rotate(-45deg) translate(0, -1px);
  }
  .checkbox:indeterminate {
    background: var(--forest); border-color: var(--forest);
  }
  .checkbox:indeterminate::after {
    content: ""; width: 8px; height: 2px; background: var(--cream); border-radius: 1px;
  }

  /* CONTACT cell */
  .c-date { font-family: 'Geist Mono', monospace; font-size: 10.5px; color: #8a8e7c; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .c-name {
    font-family: 'Instrument Serif', serif; font-size: 22px;
    line-height: 1.1; letter-spacing: -0.01em; color: var(--ink);
  }
  .c-name .badge-lang {
    display: inline-block; vertical-align: middle; margin-left: 6px;
    font-family: 'Geist Mono', monospace; font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase; color: #8a8e7c;
    padding: 2px 6px; border: 1px solid var(--line); border-radius: 999px;
  }
  .c-contact { margin-top: 6px; font-size: 13px; color: var(--forest); display: flex; flex-direction: column; gap: 2px; }
  .c-contact a { text-decoration: none; transition: color .15s ease; }
  .c-contact a:hover { color: var(--ink); text-decoration: underline; }
  .c-contact .em { color: #6b6f5e; font-size: 12px; }

  /* AI Call Summary cell */
  .summary-card {
    background: var(--paper);
    border: 1px solid var(--line-soft);
    border-radius: 12px;
    padding: 12px 14px;
    transition: all .15s ease;
  }
  .summary-card:hover {
    background: #fff;
    border-color: var(--line);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .summary-card .head {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Geist Mono', monospace; font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--moss);
    margin-bottom: 8px;
  }
  .summary-card .head .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--moss);
    box-shadow: 0 0 6px var(--moss);
  }
  .summary-card .text { font-size: 13.5px; color: #2a2f24; line-height: 1.55; white-space: pre-wrap; }
  .summary-card .toggle {
    margin-top: 6px;
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: 0; padding: 0;
    color: var(--amber); font-size: 12px; font-weight: 600;
    cursor: pointer;
  }
  .summary-card .toggle:hover { color: #8c5a13; }
  .summary-card .meta {
    margin-top: 8px; font-family: 'Geist Mono', monospace; font-size: 10px; color: #8a8e7c;
    letter-spacing: 0.06em;
  }
  .no-call {
    display: inline-flex; align-items: center; gap: 7px;
    color: #b3b6a8; font-size: 12px;
  }
  .no-call .dot { width: 6px; height: 6px; border-radius: 50%; background: #d6d3c5; }

  /* PAGINATION */
  .pager {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 4px; margin-top: 12px; flex-wrap: wrap; gap: 12px;
  }
  .pager .left, .pager .right { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #6b6f5e; font-family: 'Geist Mono', monospace; letter-spacing: 0.06em; }
  .page-size {
    display: flex; gap: 4px; padding: 3px;
    background: var(--paper); border: 1px solid var(--line); border-radius: 999px;
  }
  .page-size button {
    border: 0; background: transparent; padding: 4px 10px;
    border-radius: 999px; font: inherit; font-size: 11px; color: #6b6f5e;
    cursor: pointer; transition: all .15s ease;
    font-family: 'Geist Mono', monospace; letter-spacing: 0.06em;
  }
  .page-size button:hover { color: var(--ink); }
  .page-size button.on { background: var(--ink); color: var(--cream); }

  .page-nav { display: flex; align-items: center; gap: 4px; }
  .page-nav button {
    width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid var(--line); background: #fff;
    display: grid; place-items: center;
    color: #6b6f5e; cursor: pointer; transition: all .15s ease;
  }
  .page-nav button:hover:not(:disabled) { border-color: var(--ink); color: var(--ink); }
  .page-nav button:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-nav .info { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--ink); padding: 0 8px; }

  /* EMPTY */
  .empty {
    padding: 80px 24px; text-align: center;
    background: #fff; border: 1px solid var(--line); border-radius: 18px;
  }
  .empty .ico {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--cream); display: grid; place-items: center;
    margin: 0 auto 16px; color: var(--moss);
  }
  .empty h3 {
    font-family: 'Instrument Serif', serif; font-size: 28px; margin: 0 0 6px;
    letter-spacing: -0.01em; font-weight: 400;
  }
  .empty p { color: #6b6f5e; font-size: 14px; margin: 0 auto; max-width: 360px; line-height: 1.55; }

  /* LOADING */
  .skeleton {
    height: 96px; background: var(--paper);
    border-radius: 14px; margin-bottom: 10px;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.6; }
  }

  /* RESPONSIVE */
  @media (max-width: 880px) {
    .container { padding: 0 16px; }
    table.leads thead { display: none; }
    table.leads, table.leads tbody, table.leads tr, table.leads td { display: block; }
    table.leads tr { border-bottom: 1px solid var(--line-soft); padding: 8px 4px; }
    table.leads td { border-top: 0; padding: 8px 14px; }
    table.leads td.checkbox-cell { padding-bottom: 0; }
    .nav-meta .greeting { display: none; }
    .panel-head h2 { font-size: 28px; }
    .pager { justify-content: center; }
  }
  @media (max-width: 560px) {
    .login-card { padding: 28px 22px; }
    .login-card h1 { font-size: 30px; }
    .c-name { font-size: 20px; }
  }
</style>
</head>

<script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const supabase = window.supabase.createClient(
  window.__SUPABASE__.url,
  window.__SUPABASE__.anonKey,
  { auth: { persistSession: true, autoRefreshToken: true } }
);

const PAGE_SIZE_OPTIONS = [25, 50, 100];

function fmtDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function fmtDateLong(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
}

// Build the call-summary text shown in the table cell + PDF
function summaryText(l) {
  if (l.call_summary && l.call_summary.trim()) return l.call_summary.trim();
  if (l.call_transcript && l.call_transcript.trim()) return l.call_transcript.trim();
  // Fall back to form intent if present
  const bits = [];
  if (l.about) bits.push(l.about);
  if (l.feet) bits.push(l.feet + " ft");
  if (l.material) bits.push(l.material);
  if (l.has_gate) bits.push("+ gate");
  if (l.estimate_low && l.estimate_high) bits.push("estimate $" + l.estimate_low.toLocaleString() + " – $" + l.estimate_high.toLocaleString());
  return bits.length ? bits.join(" · ") : null;
}

function CallSummaryCell({ lead }) {
  const [expanded, setExpanded] = useState(false);
  const text = summaryText(lead);
  const hasCall = !!(lead.call_summary || lead.call_transcript);

  if (!text) {
    return (
      <span className="no-call">
        <span className="dot" />
        No call yet
      </span>
    );
  }

  const isLong = text.length > 180;
  const preview = isLong && !expanded ? text.slice(0, 180).trimEnd() + "…" : text;

  return (
    <div className="summary-card">
      {hasCall && (
        <div className="head">
          <span className="live-dot" />
          <span>AI Call Summary</span>
        </div>
      )}
      <div className="text">{preview}</div>
      {isLong && (
        <button className="toggle" onClick={() => setExpanded(!expanded)}>
          {expanded ? "Show less ↑" : "Read more ↓"}
        </button>
      )}
      {hasCall && lead.call_at && (
        <div className="meta">{fmtDate(lead.call_at)}</div>
      )}
    </div>
  );
}

async function downloadPDF(rows) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "landscape", unit: "pt", format: "a4" });

  // Header
  doc.setFont("helvetica", "bold");
  doc.setFontSize(20);
  doc.setTextColor(28, 40, 22);
  doc.text("Lead Report", 40, 50);

  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.setTextColor(120, 120, 120);
  doc.text("WeFence — Ocala, FL", 40, 68);
  doc.text("Generated " + fmtDateLong(new Date().toISOString()), 40, 82);
  doc.text(rows.length + " " + (rows.length === 1 ? "contact" : "contacts"), 40, 96);

  doc.setDrawColor(217, 154, 43);
  doc.setLineWidth(1.2);
  doc.line(40, 104, doc.internal.pageSize.width - 40, 104);

  doc.autoTable({
    startY: 118,
    head: [["Date", "Name", "Phone", "Email", "AI Call Summary"]],
    body: rows.map((l) => [
      fmtDate(l.created_at),
      l.name || "—",
      l.phone || "—",
      l.email || "—",
      summaryText(l) || "No call yet",
    ]),
    headStyles: {
      fillColor: [44, 59, 38],
      textColor: 244,
      fontStyle: "bold",
      fontSize: 9,
    },
    bodyStyles: {
      fontSize: 9,
      textColor: [40, 45, 32],
      valign: "top",
    },
    alternateRowStyles: { fillColor: [250, 247, 239] },
    columnStyles: {
      0: { cellWidth: 72 },
      1: { cellWidth: 120 },
      2: { cellWidth: 95 },
      3: { cellWidth: 150 },
      4: { cellWidth: "auto" },
    },
    margin: { left: 40, right: 40 },
    tableLineColor: [225, 220, 200],
    tableLineWidth: 0.4,
  });

  doc.save("wefence-leads-" + Date.now() + ".pdf");
}

function Login({ onAuth }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);

  const submit = async (e) => {
    e.preventDefault();
    setBusy(true);
    setErr(null);
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pw });
    setBusy(false);
    if (error) setErr(error.message);
    else if (data.session) onAuth(data.session);
  };

  return (
    <div className="login-wrap">
      <form className="login-card" onSubmit={submit}>
        <div className="brand">
          <div className="logo-mark">W</div>
          <span>WeFence</span>
        </div>
        <h1>Client <em>portal</em></h1>
        <p className="lead">Sign in to view leads and call transcripts from your website.</p>
        <div className="field">
          <label>Email</label>
          <input type="email" required value={email} onChange={e => setEmail(e.target.value)} placeholder="admin@we-fence.com" autoComplete="username" />
        </div>
        <div className="field">
          <label>Password</label>
          <input type="password" required value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••" autoComplete="current-password" />
        </div>
        <button type="submit" className="btn btn-submit" disabled={busy}>
          {busy ? "Signing in…" : "Sign in →"}
        </button>
        {err && <div className="err">{err}</div>}
        <div className="login-foot">PRIVATE · WE FENCE LLC · OCALA, FL</div>
      </form>
    </div>
  );
}

function Dashboard({ session, onSignOut }) {
  const [leads, setLeads] = useState(null); // null = loading
  const [error, setError] = useState(null);
  const [pageSize, setPageSize] = useState(25);
  const [page, setPage] = useState(1);
  const [selected, setSelected] = useState(new Set());

  const load = useCallback(async () => {
    const { data, error } = await supabase
      .from("wefence_leads")
      .select("*")
      .order("created_at", { ascending: false })
      .limit(1000);
    if (error) {
      setError(error.message);
      setLeads([]);
      return;
    }
    setLeads(data || []);
  }, []);

  useEffect(() => { load(); }, [load]);

  // Realtime: live new leads + transcript updates
  useEffect(() => {
    const channel = supabase
      .channel("wefence_leads_changes")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "wefence_leads" }, (p) => {
        setLeads(curr => curr ? [p.new, ...curr] : [p.new]);
      })
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "wefence_leads" }, (p) => {
        setLeads(curr => curr ? curr.map(l => l.id === p.new.id ? p.new : l) : curr);
      })
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, []);

  const totalPages = leads ? Math.max(1, Math.ceil(leads.length / pageSize)) : 1;
  const start = (page - 1) * pageSize;
  const paginated = useMemo(() => (leads || []).slice(start, start + pageSize), [leads, start, pageSize]);

  // Reset to page 1 if data changes and current page goes empty
  useEffect(() => {
    if (page > totalPages) setPage(1);
  }, [page, totalPages]);

  const allOnPageSelected = paginated.length > 0 && paginated.every(o => selected.has(o.id));
  const someOnPageSelected = paginated.some(o => selected.has(o.id)) && !allOnPageSelected;

  const headerCheckRef = useRef(null);
  useEffect(() => {
    if (headerCheckRef.current) headerCheckRef.current.indeterminate = someOnPageSelected;
  }, [someOnPageSelected]);

  const toggleAll = () => {
    setSelected(prev => {
      const next = new Set(prev);
      if (allOnPageSelected) paginated.forEach(o => next.delete(o.id));
      else paginated.forEach(o => next.add(o.id));
      return next;
    });
  };
  const toggleOne = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const selectedRows = useMemo(
    () => (leads || []).filter(l => selected.has(l.id)),
    [leads, selected]
  );

  const handleDownload = () => downloadPDF(selectedRows);

  return (
    <>
      <div className="nav">
        <div className="container nav-inner">
          <div className="logo">
            <div className="logo-mark">W</div>
            <span>WeFence <span style={{ color: "#8a8e7c", fontWeight: 400, marginLeft: 6 }}>· Portal</span></span>
          </div>
          <div className="nav-meta">
            <span className="pill">LIVE</span>
            <span className="greeting">Signed in as {session.user.email}</span>
            <button className="btn" onClick={onSignOut}>Sign out</button>
          </div>
        </div>
      </div>

      <div className="container panel">
        <div className="panel-head">
          <div>
            <div className="label">Lead inbox</div>
            <h2>
              Contacts
              {leads && leads.length > 0 && <span className="count-pill">{leads.length}</span>}
            </h2>
            <div className="sub">Leads &amp; AI call transcripts from we-fence.com</div>
          </div>
        </div>

        {selected.size > 0 && (
          <div className="action-bar">
            <div className="info">
              <span className="dot" />
              {selected.size} {selected.size === 1 ? "contact" : "contacts"} selected
            </div>
            <button className="btn-download" onClick={handleDownload}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Download PDF
            </button>
          </div>
        )}

        {error && <div className="err" style={{ marginBottom: 16 }}>{error}</div>}

        {leads === null ? (
          <div>
            <div className="skeleton" />
            <div className="skeleton" />
            <div className="skeleton" />
            <div className="skeleton" />
          </div>
        ) : leads.length === 0 ? (
          <div className="empty">
            <div className="ico">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
              </svg>
            </div>
            <h3>No contacts yet</h3>
            <p>Leads from your website &amp; AI voice calls will appear here automatically, in real time.</p>
          </div>
        ) : (
          <>
            <div className="table-wrap">
              <table className="leads">
                <thead>
                  <tr>
                    <th className="checkbox-col">
                      <input
                        type="checkbox"
                        ref={headerCheckRef}
                        className="checkbox"
                        checked={allOnPageSelected}
                        onChange={toggleAll}
                        aria-label="Select all on page"
                      />
                    </th>
                    <th style={{ width: "32%" }}>Contact</th>
                    <th>AI Call Summary</th>
                  </tr>
                </thead>
                <tbody>
                  {paginated.map(l => {
                    const isSel = selected.has(l.id);
                    return (
                      <tr key={l.id} className={isSel ? "selected" : ""}>
                        <td className="checkbox-cell">
                          <input
                            type="checkbox"
                            className="checkbox"
                            checked={isSel}
                            onChange={() => toggleOne(l.id)}
                            aria-label={`Select ${l.name}`}
                          />
                        </td>
                        <td>
                          <div className="c-date">{fmtDate(l.created_at)}</div>
                          <div className="c-name">
                            {l.name || "—"}
                            {l.language && l.language !== "en" && <span className="badge-lang">{l.language}</span>}
                          </div>
                          <div className="c-contact">
                            {l.phone && <a href={`tel:${l.phone.replace(/\D/g, "")}`}>{l.phone}</a>}
                            {l.email && <a className="em" href={`mailto:${l.email}`}>{l.email}</a>}
                          </div>
                        </td>
                        <td>
                          <CallSummaryCell lead={l} />
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div className="pager">
              <div className="left">
                <span>Rows per page</span>
                <div className="page-size">
                  {PAGE_SIZE_OPTIONS.map(s => (
                    <button key={s} className={pageSize === s ? "on" : ""} onClick={() => { setPageSize(s); setPage(1); }}>{s}</button>
                  ))}
                </div>
              </div>
              <div className="right">
                <span>{leads.length === 0 ? 0 : start + 1}–{Math.min(start + pageSize, leads.length)} of {leads.length}</span>
                <div className="page-nav">
                  <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1} aria-label="Previous">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  </button>
                  <span className="info">{page} / {totalPages}</span>
                  <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages} aria-label="Next">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </>
        )}
      </div>
    </>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [bootstrapping, setBootstrapping] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setBootstrapping(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, s) => {
      setSession(s);
    });
    return () => subscription.unsubscribe();
  }, []);

  const signOut = async () => {
    await supabase.auth.signOut();
    setSession(null);
  };

  if (bootstrapping) {
    return <div className="login-wrap"><div style={{ fontFamily: "'Geist Mono', monospace", fontSize: 12, letterSpacing: "0.14em", textTransform: "uppercase", color: "#6b6f5e" }}>Loading…</div></div>;
  }

  return session
    ? <Dashboard session={session} onSignOut={signOut} />
    : <Login onAuth={setSession} />;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
