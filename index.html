<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WeFence — Ocala's Trusted Fence Builders</title>
<meta name="description" content="Vinyl, wood, aluminum, and chain-link fence installation across Marion County, FL. Licensed, insured, and family-owned. Get an instant estimate in 30 seconds." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/livekit-client@1.15.4/dist/livekit-client.umd.min.js" defer crossorigin="anonymous"></script>
<style>
  :root {
    --ink: #12160F;
    --ink-2: #1E241B;
    --cream: #F4EFE4;
    --cream-2: #EBE5D6;
    --paper: #FAF7EF;
    --forest: #2C3B26;
    --forest-deep: #1B2517;
    --moss: #4A6B3A;
    --amber: #D99A2B;
    --amber-soft: #E8B24A;
    --rust: #A64B2A;
    --line: rgba(18,22,15,0.12);
    --line-soft: rgba(18,22,15,0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01","cv11";
    overflow-x: hidden;
  }

  /* REVEAL ANIMATIONS */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.d1 { transition-delay: .08s; }
  .reveal.d2 { transition-delay: .16s; }
  .reveal.d3 { transition-delay: .24s; }
  .reveal.d4 { transition-delay: .32s; }
  .reveal-x { opacity: 0; transform: translateX(-24px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal-x.in { opacity: 1; transform: translateX(0); }
  .reveal-scale { opacity: 0; transform: scale(.96); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal-scale.in { opacity: 1; transform: scale(1); }

  @keyframes floatIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal, .reveal-x, .reveal-scale { opacity: 1 !important; transform: none !important; transition: none !important; }
    * { animation: none !important; }
  }
  .serif { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
  a { color: inherit; }
  button { font-family: inherit; cursor: pointer; }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px);
    background: color-mix(in oklab, var(--paper) 82%, transparent);
    border-bottom: 1px solid var(--line-soft);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; letter-spacing: -0.01em; font-size: 18px;
  }
  .logo-mark {
    width: 30px; height: 30px; border-radius: 6px;
    background: var(--forest);
    display: grid; place-items: center; color: var(--cream);
    font-family: 'Instrument Serif', serif; font-size: 20px; font-style: italic;
    position: relative; overflow: hidden;
  }
  .logo-mark::after {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent 0 4px, rgba(244,239,228,0.18) 4px 5px);
  }
  .nav-links { display: flex; gap: 28px; font-size: 14px; color: #2a2f24; }
  .nav-links a { text-decoration: none; opacity: 0.78; }
  .nav-links a:hover { opacity: 1; }
  .nav-cta {
    display: flex; align-items: center; gap: 10px;
  }
  .lang-pill {
    display: inline-flex; border: 1px solid var(--line); border-radius: 999px;
    font-size: 12px; overflow: hidden;
  }
  .lang-pill button {
    border: 0; background: transparent; padding: 6px 10px; color: #484d40;
  }
  .lang-pill button.active { background: var(--ink); color: var(--cream); }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 999px;
    font-size: 14px; font-weight: 500;
    border: 1px solid var(--ink); background: var(--ink); color: var(--cream);
    text-decoration: none; transition: transform .15s ease;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.amber { background: var(--amber); border-color: var(--amber); color: #231a05; }
  .btn.big { padding: 14px 22px; font-size: 15px; }

  /* HERO */
  .hero {
    background: var(--forest-deep);
    color: var(--cream);
    position: relative; overflow: hidden;
    padding: 72px 0 96px;
  }
  .hero::before {
    content:""; position: absolute; inset: 0;
    background:
      radial-gradient(1200px 500px at 85% -10%, rgba(217,154,43,0.22), transparent 60%),
      radial-gradient(900px 400px at 10% 110%, rgba(74,107,58,0.35), transparent 60%);
    pointer-events: none;
    animation: fadeIn 1.4s ease-out;
  }
  .hero::after {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(244,239,228,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,239,228,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }
  .hero-grid {
    position: relative;
    display: grid; grid-template-columns: 1.15fr 1fr; gap: 56px; align-items: start;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    color: #cfc8b4; background: rgba(244,239,228,0.06);
    padding: 6px 12px; border-radius: 999px; border: 1px solid rgba(244,239,228,0.12);
  }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: #9dd06b; box-shadow: 0 0 10px #9dd06b; }
  h1.display {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(44px, 7vw, 104px);
    line-height: 0.98; letter-spacing: -0.02em;
    margin: 20px 0 18px; font-weight: 400;
  }
  h1.display em { font-style: italic; color: var(--amber-soft); display: inline-block; animation: fadeIn 1.2s ease-out .3s both; }
  .hero p.lead {
    font-size: 17px; line-height: 1.55; color: #d8d2bf; max-width: 520px;
  }
  .hero-meta {
    margin-top: 28px; display: flex; gap: 28px; flex-wrap: wrap;
    font-size: 13px; color: #c8c1ac;
  }
  .hero-meta .k { color: var(--cream); font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1; display:block; margin-bottom: 4px; }
  .hero-actions { margin-top: 28px; display: flex; gap: 10px; flex-wrap: wrap; }
  .hero .btn { border-color: var(--cream); background: var(--cream); color: var(--ink); }
  .hero .btn.ghost { background: transparent; color: var(--cream); border-color: rgba(244,239,228,0.35); }
  .hero .btn.amber { background: var(--amber); border-color: var(--amber); color: #231a05; }

  /* CALCULATOR CARD */
  .calc {
    background: var(--cream);
    color: var(--ink);
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 40px 80px -30px rgba(0,0,0,0.5), 0 2px 0 rgba(255,255,255,0.05) inset;
    border: 1px solid rgba(0,0,0,0.08);
  }
  .calc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .calc-title { font-family: 'Instrument Serif', serif; font-size: 26px; letter-spacing: -0.01em; }
  .calc-sub { font-size: 12px; color: #5c6254; }
  .tabs { display: flex; gap: 6px; background: rgba(18,22,15,0.06); padding: 4px; border-radius: 999px; }
  .tabs button { border: 0; background: transparent; padding: 7px 12px; font-size: 12px; border-radius: 999px; color: #3a3f31; }
  .tabs button.active { background: var(--ink); color: var(--cream); }
  .field { display: grid; gap: 6px; margin-bottom: 12px; }
  .field label { font-size: 12px; color: #4a4f41; display:flex; justify-content: space-between; }
  .field label .hint { color: #8a8e7c; font-weight: 400; }
  .field input[type="text"], .field input[type="number"], .field select, .field input[type="tel"], .field input[type="email"] {
    width: 100%; border: 1px solid rgba(18,22,15,0.18); background: var(--paper);
    border-radius: 10px; padding: 11px 12px; font: inherit; color: inherit;
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--ink); }
  .slider-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; }
  .slider-row .val { font-family: 'Geist Mono', monospace; font-size: 14px; background: var(--paper); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--line); }
  input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: rgba(18,22,15,0.18); border-radius: 999px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 18px; height: 18px; background: var(--ink); border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 0 4px var(--cream), 0 0 0 5px var(--ink);
  }
  .opts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .opt {
    border: 1px solid rgba(18,22,15,0.16); border-radius: 12px; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 2px;
    cursor: pointer; background: var(--paper);
    transition: border-color .15s, background .15s;
  }
  .opt .n { font-size: 13px; font-weight: 500; }
  .opt .p { font-size: 11px; color: #6b6f5e; }
  .opt.on { border-color: var(--ink); background: #fff; box-shadow: 0 0 0 3px rgba(18,22,15,0.06); }
  .addon-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--paper); }
  .toggle { width: 38px; height: 22px; border-radius: 999px; background: rgba(18,22,15,0.2); position: relative; transition: background .2s; flex-shrink: 0; }
  .toggle::after { content:""; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform .2s; }
  .toggle.on { background: var(--forest); }
  .toggle.on::after { transform: translateX(16px); }

  .estimate {
    margin-top: 14px; padding: 16px; border-radius: 14px;
    background: linear-gradient(180deg, var(--ink) 0%, #181c14 100%);
    color: var(--cream); position: relative; overflow: hidden;
  }
  .estimate::before {
    content: ""; position: absolute; right: -40px; top: -40px; width: 160px; height: 160px;
    background: radial-gradient(closest-side, rgba(217,154,43,0.35), transparent 70%);
  }
  .estimate .label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #c8c1ac; }
  .estimate .num { font-family: 'Instrument Serif', serif; font-size: 56px; line-height: 1; margin-top: 4px; letter-spacing: -0.02em; }
  .estimate .num .to { color: var(--amber-soft); font-style: italic; }
  .estimate .breakdown { display: flex; gap: 18px; margin-top: 14px; font-size: 12px; color: #cfc8b4; flex-wrap: wrap; }
  .estimate .breakdown span b { color: var(--cream); font-weight: 500; }
  .estimate .cta-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .estimate .btn { background: var(--amber); color: #231a05; border-color: var(--amber); }
  .estimate .btn.ghost { background: transparent; color: var(--cream); border-color: rgba(244,239,228,0.35); }

  .trust-strip {
    margin-top: 14px; display: flex; align-items: center; gap: 12px; font-size: 12px; color: #6b6f5e;
  }
  .trust-strip .stars { color: var(--amber); letter-spacing: 2px; }

  /* SECTIONS */
  section { padding: 96px 0; }
  .section-head { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: end; margin-bottom: 48px; }
  .section-head h2 {
    font-family: 'Instrument Serif', serif; font-size: clamp(40px, 5vw, 64px);
    line-height: 1.02; letter-spacing: -0.01em; margin: 8px 0 0; font-weight: 400;
  }
  .section-head h2 em { font-style: italic; color: var(--moss); }
  .section-head .label { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #6b6f5e; }
  .section-head .desc { color: #4a4f41; font-size: 16px; line-height: 1.55; max-width: 460px; }

  /* SERVICES */
  .svc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .svc {
    border: 1px solid var(--line);
    border-radius: 16px; overflow: hidden; background: #fff;
    display: flex; flex-direction: column;
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .svc:hover { transform: translateY(-3px); box-shadow: 0 20px 40px -20px rgba(0,0,0,0.18); }
  .svc .img {
    aspect-ratio: 4/3; position: relative; overflow: hidden;
  }
  .svc .img::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(18,22,15,0.15));
    opacity: 0; transition: opacity .3s;
  }
  .svc:hover .img::after { opacity: 1; }
  .svc:hover .img .ph svg,
  .svc:hover .img .ph img { transform: scale(1.04); }
  .svc .img .ph svg,
  .svc .img .ph img { transition: transform .6s ease; }
  .svc .img .tag {
    position: absolute; top: 10px; left: 10px; font-size: 11px;
    background: rgba(18,22,15,0.8); color: var(--cream); padding: 4px 8px; border-radius: 999px;
    font-family: 'Geist Mono', monospace;
    z-index: 2;
  }
  .svc .body { padding: 18px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .svc h3 { font-family: 'Instrument Serif', serif; font-size: 26px; margin: 0; font-weight: 400; }
  .svc p { font-size: 13px; color: #4a4f41; margin: 0; line-height: 1.5; }
  .svc .price { margin-top: auto; padding-top: 12px; font-family: 'Geist Mono', monospace; font-size: 13px; color: var(--forest); }

  /* GALLERY */
  .gallery {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    grid-template-rows: 220px 220px;
    gap: 10px;
  }
  .gallery .g { border-radius: 14px; overflow: hidden; position: relative; transition: transform .3s ease; }
  .gallery .g:hover { transform: translateY(-3px); }
  .gallery .g .ph svg,
  .gallery .g .ph img { transition: transform .8s ease; }
  .gallery .g:hover .ph svg,
  .gallery .g:hover .ph img { transform: scale(1.04); }
  .gallery .g:nth-child(1) { grid-row: span 2; }
  .gallery .g .cap {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(18,22,15,0.78); color: var(--cream);
    padding: 6px 10px; border-radius: 999px; font-size: 11px;
    font-family: 'Geist Mono', monospace;
    z-index: 2;
  }

  /* PROCESS */
  .process { background: var(--forest-deep); color: var(--cream); }
  .process h2 em { color: var(--amber-soft); }
  .process .section-head .label { color: #b3ad99; }
  .process .section-head .desc { color: #cfc8b4; }
  .steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .step { border-top: 1px solid rgba(244,239,228,0.18); padding-top: 18px; }
  .step .n { font-family: 'Instrument Serif', serif; font-size: 48px; line-height: 1; color: var(--amber-soft); font-style: italic; }
  .step h4 { margin: 8px 0 6px; font-weight: 500; font-size: 17px; letter-spacing: -0.01em; }
  .step p { margin: 0; font-size: 13px; color: #cfc8b4; line-height: 1.55; }

  /* TESTIMONIALS */
  .reviews { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .review {
    background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 22px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .review .stars { color: var(--amber); letter-spacing: 2px; font-size: 14px; }
  .review blockquote {
    margin: 0; font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1.25; letter-spacing: -0.01em;
  }
  .review .who { display: flex; align-items: center; gap: 10px; margin-top: auto; font-size: 13px; color: #4a4f41; }
  .review .who .av { width: 34px; height: 34px; border-radius: 50%; background: var(--cream-2); display: grid; place-items: center; font-family: 'Instrument Serif', serif; color: var(--forest); }

  /* AREA */
  .area { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
  .cities { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
  .chip { padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line); font-size: 13px; background: #fff; }
  .map-card {
    background: var(--cream); border-radius: 18px; padding: 20px; border: 1px solid var(--line);
    aspect-ratio: 4/3; position: relative; overflow: hidden;
  }

  /* CTA / LEAD */
  .leadcta {
    background: var(--ink);
    color: var(--cream);
    border-radius: 24px;
    padding: 48px;
    display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px; align-items: center;
    position: relative; overflow: hidden;
  }
  .leadcta::before {
    content:""; position: absolute; inset: 0;
    background:
      radial-gradient(600px 300px at 90% 10%, rgba(217,154,43,0.25), transparent 60%),
      radial-gradient(500px 300px at 5% 100%, rgba(74,107,58,0.35), transparent 60%);
    pointer-events: none;
  }
  .leadcta h3 { font-family: 'Instrument Serif', serif; font-size: 56px; line-height: 1.02; margin: 0; letter-spacing: -0.01em; font-weight: 400; }
  .leadcta h3 em { color: var(--amber-soft); }
  .leadcta p { color: #cfc8b4; max-width: 420px; }
  .lead-form {
    background: rgba(244,239,228,0.06);
    border: 1px solid rgba(244,239,228,0.18);
    border-radius: 16px; padding: 18px;
    position: relative;
    backdrop-filter: blur(4px);
  }
  .lead-form .field input { background: rgba(244,239,228,0.06); border-color: rgba(244,239,228,0.25); color: var(--cream); }
  .lead-form .field input::placeholder { color: #a39e8b; }
  .lead-form .field label { color: #cfc8b4; }
  .lead-form .btn { width: 100%; justify-content: center; background: var(--amber); border-color: var(--amber); color: #231a05; }

  /* FAQ */
  .faq { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 32px; }
  details {
    border-bottom: 1px solid var(--line); padding: 18px 0;
  }
  details summary {
    cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center;
    font-family: 'Instrument Serif', serif; font-size: 22px; letter-spacing: -0.01em;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::after { content: "+"; font-family: 'Geist Mono', monospace; font-size: 20px; color: #6b6f5e; }
  details[open] summary::after { content: "–"; }
  details p { color: #4a4f41; font-size: 14px; line-height: 1.55; margin: 10px 0 0; }

  /* FOOTER */
  footer {
    background: var(--forest-deep); color: var(--cream); padding: 64px 0 28px;
  }
  .foot-top { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr; gap: 32px; align-items: start; }
  .foot-top h5 { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #b3ad99; margin: 0 0 12px; font-weight: 500; }
  .foot-top a, .foot-top li { display: block; text-decoration: none; color: #cfc8b4; font-size: 14px; line-height: 2; }
  .foot-top ul { list-style: none; margin: 0; padding: 0; }
  .foot-bottom {
    margin-top: 48px; padding-top: 20px; border-top: 1px solid rgba(244,239,228,0.12);
    display: flex; justify-content: space-between; font-size: 12px; color: #b3ad99; flex-wrap: wrap; gap: 12px;
  }

  /* VOICE ORB */
  .orb-wrap {
    position: fixed; bottom: 24px; right: 24px; z-index: 80;
    display: flex; align-items: center; gap: 12px;
  }
  .orb-label {
    background: rgba(18,22,15,0.92); color: var(--cream);
    padding: 10px 14px; border-radius: 14px; font-size: 13px;
    backdrop-filter: blur(6px); border: 1px solid rgba(244,239,228,0.12);
    max-width: 260px; line-height: 1.35;
    opacity: 0; transform: translateX(8px); transition: all .28s cubic-bezier(.22,1,.36,1);
    pointer-events: none;
  }

function ScrollProgress() {
  const [w, setW] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      setW(h > 0 ? (window.scrollY / h) * 100 : 0);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return <div className="scroll-progress" style={{ width: w + "%" }} />;
}

function CountUp({ value, duration = 1600 }) {
  const ref = useRef(null);
  const started = useRef(false);
  const [display, setDisplay] = useState(0);
  const match = String(value).match(/^([\d.]+)(.*)$/);
  const target = match ? parseFloat(match[1]) : 0;
  const suffix = match ? match[2] : "";
  const decimals = match ? (match[1].split(".")[1] || "").length : 0;

  useEffect(() => {
    started.current = false;
    setDisplay(0);
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - t, 3);
          setDisplay(target * eased);
          if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    }, { threshold: 0.4 });
    if (ref.current) io.observe(ref.current);
    return () => io.disconnect();
  }, [target, duration, value]);

  const shown = target === 0 ? "0" : display.toFixed(decimals);
  return <span ref={ref}>{shown}{suffix}</span>;
}

function Calculator({ t, tweaks }) {
  const [feet, setFeet] = useState(150);
  const [matId, setMatId] = useState("vinyl");
  const [gate, setGate] = useState(true);
  const numRef = useRef(null);
  const prevRange = useRef("");

  const mat = t.calc.materials.find(m => m.id === matId);
  const base = feet * tweaks.pricePerFoot * mat.mult;
  const gateCost = gate ? tweaks.gatePrice : 0;
  const total = Math.round(base + gateCost);
  const low = Math.round(total * 0.94);
  const high = Math.round(total * 1.08);

  const fmt = n => "$" + n.toLocaleString();

  useEffect(() => {
    const cur = `${low}-${high}`;
    const el = numRef.current;
    if (el && prevRange.current && prevRange.current !== cur) {
      el.classList.remove("flash");
      // force reflow to restart the animation
      void el.offsetWidth;
      el.classList.add("flash");
    }
    prevRange.current = cur;
  }, [low, high]);

  return (
    <div className="calc">
      <div className="calc-head">
        <div>
          <div className="calc-title">{t.calc.title}</div>
          <div className="calc-sub">{t.calc.sub}</div>
        </div>
      </div>

      <div className="field">
        <label>
          <span>{t.calc.length}</span>
          <span className="hint">{t.calc.lengthHint}</span>
        </label>
        <div className="slider-row">
          <input type="range" min="20" max="600" step="5" value={feet} onChange={e => setFeet(Number(e.target.value))} />
          <div className="val">{feet} ft</div>
        </div>
      </div>

      <div className="field">
        <label>{t.calc.material}</label>
        <div className="opts">
          {t.calc.materials.map(m => (
            <div key={m.id} className={`opt ${matId === m.id ? "on" : ""}`} onClick={() => setMatId(m.id)}>
              <span className="n">{m.name}</span>
              <span className="p">{m.note} · ${Math.round(tweaks.pricePerFoot * m.mult)}/ft</span>
            </div>
          ))}
        </div>
      </div>

      <div className="field">
        <div className="addon-row" onClick={() => setGate(!gate)} style={{ cursor: "pointer" }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 500 }}>{t.calc.gate}</div>
            <div style={{ fontSize: 11, color: "#6b6f5e" }}>{t.calc.gateHint}</div>
          </div>
          <div className={`toggle ${gate ? "on" : ""}`} />
        </div>
      </div>

      <div className="estimate">
        <div className="label">{t.calc.estimate}</div>
        <div className="num mono" ref={numRef}>
          {fmt(low)} <span className="to">—</span> {fmt(high)}
        </div>
        <div className="breakdown">
          <span><b>{t.calc.breakdown[0]}:</b> {fmt(Math.round(base))}</span>
          {gate && <span><b>{t.calc.breakdown[1]}:</b> {fmt(gateCost)}</span>}
          <span><b>{t.calc.breakdown[2]}:</b> ${Math.round(tweaks.pricePerFoot * mat.mult)}/ft</span>
        </div>
        <div className="cta-row">
          <a href="#lead" className="btn">{t.calc.ctaLock} →</a>
          <a href={`tel:${tweaks.phone.replace(/\D/g, "")}`} className="btn ghost">{t.calc.ctaCall}</a>
        </div>
      </div>

      <div className="trust-strip">
        <span className="stars">★★★★★</span>
        <span>{t.calc.trust}</span>
        <span style={{ marginLeft: "auto", fontSize: 11 }}>{t.calc.disclaimer}</span>
      </div>
    </div>
  );
}

function VoiceOrb({ t, lang }) {
  const [state, setState] = useState("idle"); // 'idle' | 'connecting' | 'active' | 'disconnecting'
  const [error, setError] = useState(null);
  const orbRef = useRef(null);
  const roomRef = useRef(null);
  const audioCtxRef = useRef(null);
  const analyserRafRef = useRef(null);

  const uuid = () => "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
    const r = Math.random() * 16 | 0;
    const v = c === "x" ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
  const mongoId = () => {
    const ts = Math.floor(Date.now() / 1000).toString(16).padStart(8, "0");
    const rnd = Array.from({ length: 16 }, () => Math.floor(Math.random() * 16).toString(16)).join("");
    return ts + rnd;
  };
  const contactId = () => {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let r = "";
    for (let i = 0; i < 20; i++) r += chars.charAt(Math.floor(Math.random() * chars.length));
    return r;
  };

  const attachAnalyser = (track) => {
    try {
      const rawTrack = track.mediaStreamTrack;
      if (!rawTrack) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const ctx = new AC();
      audioCtxRef.current = ctx;
      const stream = new MediaStream([rawTrack]);
      const src = ctx.createMediaStreamSource(stream);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 128;
      analyser.smoothingTimeConstant = 0.82;
      src.connect(analyser);
      const data = new Uint8Array(analyser.frequencyBinCount);
      const tick = () => {
        analyser.getByteFrequencyData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += data[i];
        const avg = Math.min(1, (sum / data.length) / 160);
        if (orbRef.current) orbRef.current.style.setProperty("--audio-level", avg.toFixed(3));
        analyserRafRef.current = requestAnimationFrame(tick);
      };
      tick();
    } catch (e) {
      console.warn("Audio analyser failed:", e);
    }
  };

  const teardownAnalyser = () => {
    if (analyserRafRef.current) cancelAnimationFrame(analyserRafRef.current);
    analyserRafRef.current = null;
    if (audioCtxRef.current) {
      audioCtxRef.current.close().catch(() => {});
      audioCtxRef.current = null;
    }
    if (orbRef.current) orbRef.current.style.setProperty("--audio-level", "0");
  };

  const endCall = async () => {
    if (state === "idle" || state === "disconnecting") return;
    setState("disconnecting");
    teardownAnalyser();
    try {
      if (roomRef.current) {
        await roomRef.current.disconnect();
        roomRef.current = null;
      }
    } catch (e) {
      console.warn("Disconnect error:", e);
    }
    document.querySelectorAll('[data-voiceai-audio="wefence-orb"]').forEach((el) => el.remove());
    setState("idle");
  };

  const startCall = async () => {
    if (!window.LivekitClient) {
      setError(lang === "es" ? "Cargando SDK…" : "Loading SDK…");
      setTimeout(() => setError(null), 2500);
      return;
    }
    setState("connecting");
    setError(null);

    try {
      const sessionId = uuid();
      const payload = {
        contactId: contactId(),
        callId: mongoId(),
        widgetId: VOICE_AI_CONFIG.widgetId,
        locationId: VOICE_AI_CONFIG.locationId,
        sessionId,
        sessionFingerprint: uuid(),
        eventData: {
          source: "direct",
          referrer: document.referrer || "",
          keyword: "",
          adSource: "",
          url_params: {},
          page: { url: window.location.href, title: document.title },
          timestamp: Date.now(),
          campaign: "",
          contactSessionIds: { ids: [sessionId] },
          type: "page-visit",
          pageVisitType: "text-widget",
          domain: window.location.hostname,
          version: "v3",
          parentId: "",
          parentName: "",
          fingerprint: null,
          documentURL: window.location.href,
        },
      };

      const resp = await fetch(VOICE_AI_CONFIG.apiEndpoint + VOICE_AI_CONFIG.voiceAiConfigId, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "*/*" },
        body: JSON.stringify(payload),
      });
      if (!resp.ok) throw new Error("API " + resp.status);
      const data = await resp.json();

      const room = new window.LivekitClient.Room({
        adaptiveStream: true,
        dynacast: true,
        audioCaptureDefaults: {
          autoGainControl: true,
          echoCancellation: true,
          noiseSuppression: true,
        },
      });
      roomRef.current = room;

      room.on(window.LivekitClient.RoomEvent.TrackSubscribed, (track) => {
        if (track.kind === window.LivekitClient.Track.Kind.Audio) {
          const el = track.attach();
          el.setAttribute("data-voiceai-audio", "wefence-orb");
          document.body.appendChild(el);
          attachAnalyser(track);
        }
      });

      room.on(window.LivekitClient.RoomEvent.Disconnected, () => {
        if (roomRef.current) endCall();
      });

      await room.connect(VOICE_AI_CONFIG.livekitUrl, data.accessToken);
      await room.localParticipant.setMicrophoneEnabled(true);
      setState("active");
    } catch (e) {
      console.error("Start call error:", e);
      setError((lang === "es" ? "Error: " : "Error: ") + (e.message || "connection"));
      setState("idle");
      setTimeout(() => setError(null), 4000);
    }
  };

  useEffect(() => {
    const onUnload = () => { if (roomRef.current) roomRef.current.disconnect(); };
    window.addEventListener("beforeunload", onUnload);
    return () => {
      window.removeEventListener("beforeunload", onUnload);
      if (roomRef.current) roomRef.current.disconnect();
      teardownAnalyser();
    };
  }, []);

  const onClick = () => {
    if (state === "idle") startCall();
    else if (state === "active") endCall();
  };

  const statusLabel =
    state === "connecting" ? (lang === "es" ? "Conectando…" : "Connecting…") :
    state === "active"     ? (lang === "es" ? "En llamada · toca para colgar" : "Live · tap to end") :
    state === "disconnecting" ? (lang === "es" ? "Colgando…" : "Disconnecting…") :
    t.orb.sub;

  const btnTitle = state === "active"
    ? (lang === "es" ? "Colgar" : "End call")
    : t.orb.title;

  return (
    <div className="orb-wrap" data-state={state} title={btnTitle}>
      <div className="orb-label">
        <span className="k">AI Voice Agent</span>
        <strong style={{ color: "#fff" }}>{t.orb.title}</strong>
        <div className="status-row" style={{ color: "#cfc8b4" }}>
          <span className="status-dot" />
          <span>{statusLabel}</span>
        </div>
        {error && <div className="orb-err">{error}</div>}
      </div>
      <button
        className="orb"
        ref={orbRef}
        aria-label={btnTitle}
        onClick={onClick}
        disabled={state === "connecting" || state === "disconnecting"}
      >
        <span className="ring-3" />
        <span className="wave" />
        <span className="core" />
        <span className="mic">
          {state === "active" ? (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" aria-hidden>
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          ) : (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden>
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" fill="currentColor" stroke="none"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
            </svg>
          )}
        </span>
        <span className="spinner" />
      </button>
    </div>
  );
}

function App() {

  // Scroll reveal via IntersectionObserver
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("in");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });

    const nodes = document.querySelectorAll(".reveal, .reveal-x, .reveal-scale, .reveal-blur");
    nodes.forEach((n) => io.observe(n));
    return () => io.disconnect();
  }, [lang]);

  // Nav scroll-shrink
  useEffect(() => {
    const nav = document.querySelector(".nav");
    if (!nav) return;
    const onScroll = () => {
      if (window.scrollY > 20) nav.classList.add("scrolled");
      else nav.classList.remove("scrolled");
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  // Hero mouse-follow spotlight
  useEffect(() => {
    const hero = document.querySelector(".hero");
    if (!hero) return;
    let raf;
    const onMove = (e) => {
      const r = hero.getBoundingClientRect();
      const mx = ((e.clientX - r.left) / r.width) * 100;
      const my = ((e.clientY - r.top) / r.height) * 100;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        hero.style.setProperty("--mx", mx + "%");
        hero.style.setProperty("--my", my + "%");
      });
    };
    hero.addEventListener("mousemove", onMove);
    return () => { hero.removeEventListener("mousemove", onMove); cancelAnimationFrame(raf); };
  }, []);

  // 3D tilt on service + review cards
  useEffect(() => {
    if (window.matchMedia("(hover: none)").matches) return;
    const cards = document.querySelectorAll(".svc, .review");
    const intensity = 5;
    const attach = (el) => {
      let raf;
      const onMove = (e) => {
        const r = el.getBoundingClientRect();
        const px = ((e.clientX - r.left) / r.width) * 2 - 1;
        const py = ((e.clientY - r.top) / r.height) * 2 - 1;
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => {
          el.style.transform = `perspective(1000px) rotateY(${px * intensity}deg) rotateX(${-py * intensity}deg) translateY(-4px)`;
        });
      };
      const onLeave = () => {
        cancelAnimationFrame(raf);
        el.style.transform = "";
      };
      el.addEventListener("mousemove", onMove);
      el.addEventListener("mouseleave", onLeave);
      return () => {
        el.removeEventListener("mousemove", onMove);
        el.removeEventListener("mouseleave", onLeave);
        cancelAnimationFrame(raf);
      };
    };
    const cleanups = Array.from(cards).map(attach);
    return () => cleanups.forEach(c => c());
  }, [lang]);

  // Magnetic big buttons
  useEffect(() => {
    if (window.matchMedia("(hover: none)").matches) return;
    const btns = document.querySelectorAll(".btn.big");
    const attach = (el) => {
      let raf;
      const onMove = (e) => {
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = (e.clientX - cx) * 0.2;
        const dy = (e.clientY - cy) * 0.3;
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => {
          el.style.transform = `translate(${dx}px, ${dy}px)`;
        });
      };
      const onLeave = () => {
        cancelAnimationFrame(raf);
        el.style.transform = "";
      };
      el.addEventListener("mousemove", onMove);
      el.addEventListener("mouseleave", onLeave);
      return () => {
        el.removeEventListener("mousemove", onMove);
        el.removeEventListener("mouseleave", onLeave);
        cancelAnimationFrame(raf);
      };
    };
    const cleanups = Array.from(btns).map(attach);
    return () => cleanups.forEach(c => c());
